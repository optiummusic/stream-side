name: Build Windows Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 1. Кэшируем только установленные библиотеки FFmpeg
      - name: Restore vcpkg artifacts cache
        id: cache-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: C:/vcpkg/installed
          # Кэш привязан к ОС и твоему Cargo.toml (если там меняются версии)
          key: ${{ runner.os }}-vcpkg-ffmpeg-${{ hashFiles('Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ffmpeg-

      # 2. Устанавливаем FFmpeg через системный vcpkg, если нет в кэше
      - name: Install FFmpeg via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: vcpkg install ffmpeg:x64-windows

      # 3. Сохраняем кэш собранного FFmpeg сразу (чтобы не пересобирать при ошибках Rust)
      - name: Save vcpkg artifacts cache
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:/vcpkg/installed
          key: ${{ runner.os }}-vcpkg-ffmpeg-${{ hashFiles('Cargo.toml') }}

      # 4. Прописываем пути к FFmpeg для компилятора Rust (ffmpeg-next)
      - name: Set FFmpeg Environment Variables
        shell: bash
        run: |
          # В GitHub Actions vcpkg ставит всё в C:/vcpkg/installed
          VCPKG_INSTALLED="C:/vcpkg/installed/x64-windows"
          echo "FFMPEG_DIR=$VCPKG_INSTALLED" >> $GITHUB_ENV
          echo "$VCPKG_INSTALLED/bin" >> $GITHUB_PATH

      # 5. Кэшируем зависимости самого Rust
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # 6. Собираем только ресивер
      - name: Build and Prepare Artifact
        shell: bash
        run: |
          # Собираем
          cargo build -p receiver --release
          
          # Копируем DLL из vcpkg прямо к экзешнику
          # Это нужно и для артефакта, и чтобы экзешник вообще запустился у пользователя
          cp C:/vcpkg/installed/x64-windows/bin/*.dll target/release/
          
          # Проверим, что всё на месте (для логов)
          ls -lh target/release/receiver.exe
          ls -lh target/release/*.dll

      # 7. Выгружаем всю папку release (или только нужные файлы из неё)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: receiver-windows
          # Теперь путь один, и он внутри воркспейса
          path: |
            target/release/receiver.exe
            target/release/*.dll