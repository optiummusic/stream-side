name: Build Windows Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat

      - name: Install FFmpeg via vcpkg
        run: |
          # Нам нужны библиотеки для линковки
          ./vcpkg/vcpkg.exe install ffmpeg:x64-windows

      - name: Set FFmpeg Environment Variables
        shell: bash
        run: |
          # Указываем ffmpeg-next, где искать либы
          VCPKG_ROOT=$(pwd)/vcpkg
          echo "FFMPEG_DIR=$VCPKG_ROOT/installed/x64-windows" >> $GITHUB_ENV
          echo "PATH=$VCPKG_ROOT/installed/x64-windows/bin;$PATH" >> $GITHUB_ENV

      - name: Build Receiver
        run: |
          cargo build --release --bin receiver

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: receiver-windows
          path: |
            target/release/receiver.exe
            vcpkg/installed/x64-windows/bin/*.dll